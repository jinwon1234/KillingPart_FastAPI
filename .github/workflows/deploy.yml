name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 앱 import 확인
        run: python -c "from app import app; print(app)"

      - name: AWS Resource에 접근할 수 있게 AWS credentials 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECR에 로그인하기
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 생성
        run: docker build --platform linux/amd64 -t fastapi .

      - name: Docker tag를 위한 날짜 설정
        run: echo "date=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Docker 이미지에 Tag 붙이기
        run: docker tag fastapi ${{ steps.login-ecr.outputs.registry }}/fastapi:${{ env.date }}

      - name: ECR에 Docker 이미지 Push하기
        run: docker push ${{ steps.login-ecr.outputs.registry }}/fastapi:${{ env.date }}

      - name: SSH로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            docker pull ${{ steps.login-ecr.outputs.registry }}/fastapi:${{ env.date }}
            docker stop killing-part-fast-api || true
            docker rm killing-part-fast-api || true
            docker run -d \
            --restart=always \
            -e TZ=Asia/Seoul \
            --name killing-part-fast-api \
            -p 8080:8000 \
            ${{ steps.login-ecr.outputs.registry }}/fastapi:${{ env.date }}
